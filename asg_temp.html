        <script type="text/javascript">

                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#FF4B4B", "font": {"color": "white"}, "id": "CONTEXT", "label": "Scene\n(fearful)", "shape": "box", "size": 10, "title": "Global Context"}, {"color": "#FFA500", "font": {"color": "white"}, "id": "Event_Speech", "label": "Speech", "shape": "ellipse", "size": 10, "title": "Conf: 0.74"}, {"color": "#FFA500", "font": {"color": "white"}, "id": "Event_Narration, Monologue", "label": "Narration, Monologue", "shape": "ellipse", "size": 10, "title": "Conf: 0.06"}, {"color": "#FFA500", "font": {"color": "white"}, "id": "Event_Male Speech, Man Speaking", "label": "Male Speech, Man Speaking", "shape": "ellipse", "size": 10, "title": "Conf: 0.05"}, {"color": "#00C853", "font": {"color": "white"}, "id": "Speaker A", "label": "Speaker A", "shape": "dot", "size": 10}, {"color": "#00BFFF", "font": {"color": "white"}, "id": "Txt_0.0", "label": " Ja, wir haben ..", "shape": "box", "size": 10, "title": "0.0-5.0:  Ja, wir haben schon nicht auch alles so viel geschossen."}, {"color": "#00BFFF", "font": {"color": "white"}, "id": "Txt_5.0", "label": " Wir m\u00fcssen uns..", "shape": "box", "size": 10, "title": "5.0-8.0:  Wir m\u00fcssen uns in die Freizeit selbst fahren."}]);

                  nodeColors = {};

                  for (nodeId in allNodes) {

                  var options = {
    "configure": {

    },

};
